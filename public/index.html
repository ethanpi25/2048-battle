<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048 Battle</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Lobby View -->
  <div id="view-lobby" class="view active">
    <div class="lobby-card">
      <h1>2048 Battle</h1>
      <p class="subtitle">Challenge a friend in real-time</p>

      <div class="lobby-actions">
        <button id="btn-create" class="btn btn-primary">Create Room</button>

        <div class="divider">or</div>

        <div class="join-group">
          <input id="input-room-code" class="input-code" type="text" placeholder="CODE" maxlength="6">
        </div>
        <button id="btn-join" class="btn btn-secondary">Join</button>
      </div>

      <div id="room-code-display" class="room-code-display hidden">
        <div class="label">Share this code</div>
        <div class="code-row">
          <div id="room-code-value" class="code"></div>
          <button id="btn-copy-code" class="btn-copy" title="Copy">&#128203;</button>
        </div>
      </div>

      <p id="lobby-status" class="lobby-status"></p>
    </div>
  </div>

  <!-- Game View -->
  <div id="view-game" class="view">
    <div class="player-section my-section">
      <div class="player-header">
        <span class="player-name">You</span>
        <div class="score-container">
          <span id="my-score">0</span>
        </div>
      </div>
      <div id="my-grid" class="grid"></div>
    </div>

    <div class="player-section opponent-section">
      <div class="player-header">
        <span class="player-name">Opponent</span>
        <div class="score-container">
          <span id="opponent-score">0</span>
        </div>
      </div>
      <div id="opponent-grid" class="grid"></div>
    </div>

    <div id="countdown-overlay" class="countdown-overlay hidden">
      <span id="countdown-text" class="countdown-text"></span>
    </div>
  </div>

  <!-- Results View -->
  <div id="view-results" class="view">
    <div class="results-card">
      <h2 id="result-title" class="result-win">You Win!</h2>
      <p id="result-message" class="result-message"></p>

      <div class="result-scores">
        <div class="result-score-item">
          <div class="label">Your Score</div>
          <div id="result-my-score" class="value">0</div>
        </div>
        <div class="result-score-item">
          <div class="label">Opponent</div>
          <div id="result-opponent-score" class="value">0</div>
        </div>
      </div>

      <div class="results-actions">
        <button id="btn-play-again" class="btn btn-primary">Play Again</button>
        <button id="btn-back-lobby" class="btn btn-secondary">Back to Lobby</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/game.js"></script>
  <script src="/js/board.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
