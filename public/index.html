<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048 对战</title>

  <!-- DNS prefetch for socket.io -->
  <link rel="dns-prefetch" href="//cdnjs.cloudflare.com">

  <!-- Preload critical resources -->
  <link rel="preload" href="/css/style.css" as="style">
  <link rel="preload" href="/images/bg-chinese.jpg" as="image">
  <link rel="preload" href="/socket.io/socket.io.js" as="script">

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Lobby View -->
  <div id="view-lobby" class="view active">
    <div class="lobby-card">
      <h1>2048 对战</h1>
      <p class="subtitle">选择对战模式</p>

      <!-- Mode Selection -->
      <div id="mode-select" class="lobby-actions">
        <button id="btn-ai-mode" class="btn btn-primary">人机对战</button>
        <button id="btn-room-mode" class="btn btn-secondary">房间对战</button>
        <button id="btn-leaderboard" class="btn btn-leaderboard">🏆 今日榜单</button>
      </div>

      <!-- AI Difficulty Selection -->
      <div id="lobby-ai-section" class="lobby-actions hidden">
        <button id="btn-ai-back" class="btn-back">&larr; 返回</button>
        <p class="section-title">选择难度</p>
        <button id="btn-diff-easy" class="btn btn-diff btn-diff-easy">简单</button>
        <button id="btn-diff-medium" class="btn btn-diff btn-diff-medium">中等</button>
        <button id="btn-diff-hell" class="btn btn-diff btn-diff-hell">地狱</button>
      </div>

      <!-- Room Lobby -->
      <div id="lobby-room-section" class="lobby-actions hidden">
        <button id="btn-room-back" class="btn-back">&larr; 返回</button>
        <button id="btn-create" class="btn btn-primary">创建房间</button>

        <div class="divider">或</div>

        <div class="join-group">
          <input id="input-room-code" class="input-code" type="text" placeholder="房间码" maxlength="6">
        </div>
        <button id="btn-join" class="btn btn-secondary">加入</button>
      </div>

      <div id="room-code-display" class="room-code-display hidden">
        <div class="label">分享房间码</div>
        <div class="code-row">
          <div id="room-code-value" class="code"></div>
          <button id="btn-copy-code" class="btn-copy" title="复制">&#128203;</button>
        </div>
      </div>

      <p id="lobby-status" class="lobby-status"></p>
    </div>
  </div>

  <!-- Game View -->
  <div id="view-game" class="view">
    <div id="game-timer" class="game-timer">2:00</div>
    <button id="btn-sound-toggle" class="btn-sound" title="音效开关">🔊</button>

    <div class="player-section my-section">
      <div class="player-header">
        <span id="my-name" class="player-name">我</span>
        <div class="score-container">
          <span id="my-score">0</span>
        </div>
      </div>
      <div id="my-grid" class="grid"></div>
    </div>

    <div class="player-section opponent-section">
      <div class="player-header">
        <span id="opponent-name" class="player-name">对手</span>
        <div class="score-container">
          <span id="opponent-score">0</span>
        </div>
      </div>
      <div id="opponent-grid" class="grid"></div>
    </div>

    <div id="countdown-overlay" class="countdown-overlay hidden">
      <span id="countdown-text" class="countdown-text"></span>
    </div>
  </div>

  <!-- Results View -->
  <div id="view-results" class="view">
    <div class="results-card">
      <h2 id="result-title" class="result-win">你赢了！</h2>
      <p id="result-message" class="result-message"></p>

      <div class="result-scores">
        <div class="result-score-item">
          <div class="label">我的得分</div>
          <div id="result-my-score" class="value">0</div>
        </div>
        <div class="result-score-item">
          <div id="result-opponent-label" class="label">对手</div>
          <div id="result-opponent-score" class="value">0</div>
        </div>
      </div>

      <div class="results-actions">
        <button id="btn-play-again" class="btn btn-primary">再来一局</button>
        <button id="btn-back-lobby" class="btn btn-secondary">返回大厅</button>
      </div>
    </div>
  </div>

  <!-- Leaderboard View -->
  <div id="view-leaderboard" class="view">
    <div class="leaderboard-card">
      <button id="btn-lb-back" class="btn-back">&larr; 返回大厅</button>
      <h2 class="lb-title">🏆 今日英雄榜</h2>
      <p id="lb-date" class="lb-date"></p>
      <div id="lb-list" class="lb-list">
        <p class="lb-loading">加载中...</p>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script defer src="/js/game.js"></script>
  <script defer src="/js/board.js"></script>
  <script defer src="/js/socket.js"></script>
  <script defer src="/js/ai.js"></script>
  <script defer src="/js/sound.js"></script>
  <script defer src="/js/main.js"></script>
</body>
</html>
